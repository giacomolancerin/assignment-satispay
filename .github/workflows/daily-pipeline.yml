name: Daily blog pipeline

on:
  schedule:
    - cron: '0 4 * * *'   # 06:00 CET (UTC+2 estate, UTC+1 inverno; piccolo drift accettabile)
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: uv run python -m blog_automation

      - name: Commit & push articles
        run: |
          git config user.name "blog-bot"
          git config user.email "blog-bot@users.noreply.github.com"
          git rm --ignore-unmatch 'articles/published/*.md'
          git add articles/published/ sources/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            COMMIT_MSG="feat: daily pipeline run $(date -u +%Y-%m-%d)"
            if [ -f published_summary.txt ]; then
              git commit -F published_summary.txt
            else
              git commit -m "$COMMIT_MSG"
            fi
            git push
          fi
